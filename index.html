<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Etnis Toulour</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .login-box {
      width: 350px;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 25px;
      color: #2c3e50;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: 1px solid #ddd;
      border-radius: 12px;
      box-sizing: border-box;
      font-size: 15px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 12px;
      background: #3498db;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #2980b9;
    }

    .error {
      color: red;
      margin-top: 12px;
      display: none;
    }
  </style>
</head>
<body>

<div class="login-box">
  <h2>Login Member Etnis Toulour</h2>

  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div class="error" id="errorMsg">
    Username atau password salah
  </div>
</div>

<script>
function login() {
  const username = encodeURIComponent(document.getElementById("username").value);
  const password = encodeURIComponent(document.getElementById("password").value);

  const apiUrl =
    "https://script.google.com/macros/s/AKfycbzZT02LnT8L8xgckSrcfZc3J0RVGTxJ9pePonbHK7P8eLMkw04CbdzS3JXzMBAR0EM/exec" +
    "?username=" + username +
    "&password=" + password;

  window.location.href = apiUrl;
}
</script>

</body>
</html>
